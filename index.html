<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Harmonic Uplink</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.3);
            --text: #1d1d1f;
            --accent: #007aff;
            --danger: #ff3b30;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        [data-theme="dark"] {
            --bg: #0f0f0f;
            --glass: rgba(30, 30, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f5f5f7;
            --accent: #0a84ff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 400px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h2 { font-weight: 600; letter-spacing: -0.5px; margin-bottom: 25px; }

        #timer {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            color: var(--danger);
            margin-bottom: 20px;
        }

        .status-display {
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 0.9em;
            font-weight: 500;
        }

        /* Sleek Controls */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 15px 0;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: var(--accent);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            margin-top: -7px;
            cursor: pointer;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.98); }

        .evasive-target {
            position: fixed;
            width: 140px;
            background: var(--danger);
            z-index: 999;
            box-shadow: 0 10px 20px rgba(255, 59, 48, 0.3);
        }

        #theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: auto;
            background: var(--glass);
            color: var(--text);
            padding: 8px 15px;
            font-size: 0.8em;
        }

        .glitch-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none;
            background: var(--danger);
            opacity: 0;
            z-index: 1000;
        }
    </style>
</head>
<body id="body">
    <div class="glitch-overlay" id="overlay"></div>
    <button id="theme-toggle">Switch Theme</button>

    <div class="glass-panel" id="ui-panel">
        <div id="timer">Expires in 120s</div>
        <h2>Harmonic Uplink</h2>
        
        <div class="status-display" id="display">System Calibration Required</div>
        
        <div style="text-align: left; font-size: 0.8em; opacity: 0.7;">Frequency Target</div>
        <input type="range" id="freq" min="260" max="525" step="0.01" value="300">
        <div id="freq-val" style="font-weight: 700;">300.00 Hz</div>

        <button id="play">Preview Pulse</button>
        
        <div class="status-display" id="buffer">Buffer: Empty</div>
        <button id="submit">Uplink Core</button>
    </div>

    <button id="commit" class="evasive-target" style="top: 80%; left: 45%;">Commit Note</button>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let circuitHeat = 0;
    let timeLeft = 120;
    let buffer = [];

    const body = document.getElementById('body');
    const freqSlider = document.getElementById('freq');
    const commitBtn = document.getElementById('commit');
    const overlay = document.getElementById('overlay');

    // Theme Toggle
    document.getElementById('theme-toggle').onclick = () => {
        const current = body.getAttribute('data-theme');
        body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    };

    // 1. Sleek Drift (The sliders still move)
    setInterval(() => {
        if (circuitHeat > 2) {
            const drift = (Math.random() - 0.5) * (circuitHeat / 3);
            freqSlider.value = parseFloat(freqSlider.value) + drift;
            document.getElementById('freq-val').innerText = parseFloat(freqSlider.value).toFixed(2) + " Hz";
        }
    }, 60);

    // 2. High-Speed Evasion
    document.addEventListener('mousemove', (e) => {
        const rect = commitBtn.getBoundingClientRect();
        const dist = Math.hypot(e.clientX - (rect.left + 70), e.clientY - (rect.top + 25));

        if (dist < 150) {
            const angle = Math.atan2((rect.top + 25) - e.clientY, (rect.left + 70) - e.clientX);
            let newX = rect.left + Math.cos(angle) * 250;
            let newY = rect.top + Math.sin(angle) * 250;

            newX = Math.max(20, Math.min(window.innerWidth - 160, newX));
            newY = Math.max(20, Math.min(window.innerHeight - 60, newY));

            commitBtn.style.left = newX + 'px';
            commitBtn.style.top = newY + 'px';
        }
    });

    // 3. Modern "Stress" Visuals
    const timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `Expires in ${timeLeft}s`;

        if (timeLeft < 30) {
            overlay.style.opacity = (timeLeft % 2 === 0) ? '0.1' : '0';
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            alert("Session timeout. Local data encrypted.");
            location.reload();
        }
    }, 1000);

    // 4. Clean Audio Engine
    document.getElementById('play').onclick = () => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine'; // Sleeker sound for modern UI
        osc.frequency.value = parseFloat(freqSlider.value);
        
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    };

    // 5. The "Professional" Trap
    commitBtn.onclick = () => {
        circuitHeat += 15;
        timeLeft -= 10;
        buffer.push(freqSlider.value);
        document.getElementById('buffer').innerText = "Buffer: " + "• ".repeat(buffer.length);
        document.getElementById('display').innerText = "Calibration Segment Saved";
    };

    document.getElementById('submit').onclick = () => {
        document.getElementById('display').innerText = "Authenticating with Server...";
        setTimeout(() => {
            alert("Uplink Refused: Subtle frequency jitter detected in packet stream.");
            location.reload();
        }, 2500);
    };
</script>
</body>
</html>
