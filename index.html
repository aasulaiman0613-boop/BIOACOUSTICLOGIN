<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL CRITICAL: BIO-HARMONIC DRIFT</title>
    <style>
        :root { --glitch-color: #0f0; }
        body { 
            background: #050505; color: #0f0; font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
            perspective: 1000px;
        }
        .panel { 
            border: 3px solid #0f0; padding: 30px; background: #000; 
            box-shadow: 0 0 30px #0f0; width: 450px; text-align: center;
            position: relative; z-index: 10;
        }
        #timer { color: #f00; font-size: 1.8em; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px #f00; }
        .lcd { background: #020; padding: 15px; border: 1px inset #0f0; margin: 15px 0; font-size: 1.1em; color: #0f0; min-height: 1.2em; }
        input[type=range] { width: 100%; cursor: none; filter: hue-rotate(90deg); margin-bottom: 10px; }
        
        button { 
            background: #0f0; color: #000; border: none; padding: 12px; 
            font-weight: bold; cursor: crosshair; margin-top: 10px; width: 100%;
            text-transform: uppercase;
        }

        /* Extreme Distortions */
        .extreme-distort {
            animation: shake 0.1s infinite, hue-rot 0.5s infinite;
            filter: contrast(200%) brightness(150%);
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            50% { transform: translate(-2px, -2px) rotate(1deg); }
            100% { transform: translate(2px, -2px) rotate(-1deg); }
        }

        @keyframes hue-rot {
            from { filter: hue-rotate(0deg) saturate(5); }
            to { filter: hue-rotate(360deg) saturate(10); }
        }

        .evasive-target {
            position: fixed;
            width: 150px;
            z-index: 9999;
            transition: transform 0.05s linear;
        }

        .decoy { opacity: 0.7; pointer-events: auto; }

        #buffer { font-size: 1.5em; letter-spacing: 5px; color: #ff0; }
        .warning { color: #f00; font-size: 0.7em; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body id="body">

<div class="panel" id="main-panel">
    <div id="timer">SESSION EXPIRES IN: 120s</div>
    <h2>BIO-ACOUSTIC AUTHENTICATION</h2>
    
    <div class="lcd" id="display">INITIALIZING...</div>
    
    <label>TARGET RESONANCE (Hz)</label>
    <input type="range" id="freq" min="260" max="525" step="0.01" value="260">
    <div id="freq-val">260.00 Hz</div>

    <label>PULSE DURATION (ms)</label>
    <input type="range" id="duration" min="100" max="2000" step="1" value="500">
    <div id="dur-val">500 ms</div>

    <button id="play">PREVIEW FREQUENCY</button>
    
    <div class="lcd" id="buffer">Buffer: </div>
    <button id="submit">SUBMIT HARMONIC ARRAY</button>
    <div class="warning">CRITICAL ERROR: OPTICAL SENSORS FAILING.</div>
</div>

<button id="commit" class="evasive-target" style="top: 80%; left: 45%;">COMMIT NOTE (-10s)</button>

<script>
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let passwordBuffer = [];
    let circuitHeat = 0;
    let timeLeft = 120;
    let isSubmitting = false;

    const freqSlider = document.getElementById('freq');
    const timerDisplay = document.getElementById('timer');
    const panel = document.getElementById('main-panel');
    const commitBtn = document.getElementById('commit');
    const body = document.getElementById('body');

    // 1. QUANTUM EVADE (The Button is a Lie)
    const moveButton = (btn) => {
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 50);
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    };

    document.addEventListener('mousemove', (e) => {
        const btnRect = commitBtn.getBoundingClientRect();
        const btnCenter = { x: btnRect.left + 75, y: btnRect.top + 25 };
        const dist = Math.hypot(e.clientX - btnCenter.x, e.clientY - btnCenter.y);

        // If mouse gets close, teleport
        if (dist < 120) {
            moveButton(commitBtn);
            if (circuitHeat > 20 && Math.random() > 0.7) spawnDecoy();
        }
    });

    function spawnDecoy() {
        const decoy = commitBtn.cloneNode(true);
        decoy.classList.add('decoy');
        decoy.innerText = "COMMIT NOTE";
        body.appendChild(decoy);
        moveButton(decoy);
        decoy.onclick = () => {
            alert("DECOY TRIGGERED: DATA CORRUPTION DETECTED.");
            location.reload();
        };
        setTimeout(() => decoy.remove(), 2000);
    }

    // 2. EXTREME DISTORTION LOGIC
    const countdown = setInterval(() => {
        if(isSubmitting) return;
        timeLeft--;
        timerDisplay.innerText = `SESSION EXPIRES IN: ${timeLeft}s`;

        if (timeLeft < 90) {
            body.className = (timeLeft % 2 === 0) ? 'extreme-distort' : '';
            panel.style.transform = `rotateY(${Math.sin(timeLeft)*20}deg) rotateX(${Math.cos(timeLeft)*20}deg)`;
        }

        if (timeLeft <= 0) {
            body.innerHTML = "<h1 style='color:red; font-size:10vw;'>SYSTEM PURGED</h1>";
            setTimeout(() => location.reload(), 2000);
        }
    }, 1000);

    // 3. AUDIO (EAR PIERCING)
    document.getElementById('play').onclick = () => {
        if(ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        
        osc.type = 'square'; // Extremely harsh
        osc.frequency.setValueAtTime(parseFloat(freqSlider.value), ctx.currentTime);
        
        // Add random pitch modulation (jitter)
        osc.frequency.exponentialRampToValueAtTime(parseFloat(freqSlider.value) + circuitHeat, ctx.currentTime + 0.1);

        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    };

    // 4. THE COMMIT TRAP
    commitBtn.onclick = () => {
        timeLeft -= 15; // Increased penalty
        circuitHeat += 15;
        passwordBuffer.push(parseFloat(freqSlider.value));
        document.getElementById('buffer').innerText = "Buffer: " + "*".repeat(passwordBuffer.length);
        document.getElementById('display').innerText = "NODE LOCKED. HEAT CRITICAL.";
        moveButton(commitBtn);
    };

    // 5. SUBMIT GASLIGHT
    document.getElementById('submit').onclick = () => {
        isSubmitting = true;
        panel.style.animation = "hue-rot 0.1s infinite";
        let p = 0;
        const loader = setInterval(() => {
            p += 1;
            document.getElementById('display').innerText = `DECRYPTING: ${p}%`;
            if (p >= 99) {
                clearInterval(loader);
                setTimeout(() => {
                    alert("ERROR: 0x0000F2 - Harmonic Sync Lost. User too slow.");
                    location.reload();
                }, 1000);
            }
        }, 50);
    };

</script>
</body>
</html>
