<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ CRITICAL SYSTEM INSTABILITY ⚠️</title>
    <style>
        :root { --glitch-green: #0f0; --error-red: #f00; }
        body { 
            background: #000; color: var(--glitch-green); font-family: 'Courier New', monospace; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        .panel { 
            border: 4px double var(--glitch-green); padding: 30px; background: #050505; 
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.2); width: 450px; text-align: center;
            position: relative; z-index: 10;
        }
        #timer { color: var(--error-red); font-size: 2em; font-weight: bold; text-shadow: 0 0 15px var(--error-red); }
        .lcd { background: #010; padding: 15px; border: 1px solid var(--glitch-green); margin: 15px 0; font-size: 1.1em; }
        
        input[type=range] { width: 100%; cursor: none; filter: hue-rotate(280deg); margin: 10px 0; }
        
        button { 
            background: var(--glitch-green); color: #000; border: none; padding: 15px; 
            font-weight: bold; cursor: crosshair; width: 100%; text-transform: uppercase;
        }

        /* Extreme Visual Distortion */
        .glitch-active { animation: flash 0.05s infinite; }
        @keyframes flash {
            0% { opacity: 1; filter: invert(0); }
            50% { opacity: 0.8; filter: invert(1) sepia(1) saturate(5); }
            100% { opacity: 1; filter: invert(0); }
        }

        .evasive-target {
            position: fixed; width: 160px; z-index: 999;
            box-shadow: 0 0 20px var(--error-red);
            transition: top 0.1s ease-out, left 0.1s ease-out;
            background: var(--error-red); color: white;
        }

        #buffer { font-size: 1.5em; color: #ff0; text-shadow: 0 0 5px #ff0; }
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 255, 0, 0.1);
            position: absolute; top: 0; left: 0; pointer-events: none;
            animation: scan 2s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body id="main-body">
<div class="scanline"></div>

<div class="panel" id="ui-panel">
    <div id="timer">TERMINATION IN: 120s</div>
    <h2 style="letter-spacing: -2px;">UNSTABLE UPLINK</h2>
    
    <div class="lcd" id="display">CALIBRATING BIO-RESONANCE...</div>
    
    <label>FREQUENCY (DRIFT ACTIVE)</label>
    <input type="range" id="freq" min="260" max="525" step="0.01" value="300">
    <div id="freq-val">300.00 Hz</div>

    <label>PULSE WIDTH</label>
    <input type="range" id="duration" min="100" max="2000" step="1" value="500">

    <button id="play" style="margin-bottom:10px;">PREVIEW HARMONIC</button>
    
    <div class="lcd" id="buffer">BUFFER: [EMPTY]</div>
    <button id="submit">UPLINK TO CORE</button>
</div>

<button id="commit" class="evasive-target">COMMIT NOTE</button>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let circuitHeat = 0;
    let timeLeft = 120;
    let buffer = [];

    const body = document.getElementById('main-body');
    const freqSlider = document.getElementById('freq');
    const commitBtn = document.getElementById('commit');

    // 1. THE DRIFT: Sliders move on their own
    setInterval(() => {
        if (circuitHeat > 5) {
            const drift = (Math.random() - 0.5) * (circuitHeat / 2);
            freqSlider.value = parseFloat(freqSlider.value) + drift;
            document.getElementById('freq-val').innerText = parseFloat(freqSlider.value).toFixed(2) + " Hz";
        }
    }, 50);

    // 2. THE EVASION: Improved button "flight" logic
    document.addEventListener('mousemove', (e) => {
        const rect = commitBtn.getBoundingClientRect();
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        const btnX = rect.left + rect.width / 2;
        const btnY = rect.top + rect.height / 2;

        const distance = Math.hypot(mouseX - btnX, mouseY - btnY);

        if (distance < 150) {
            // Calculate vector away from mouse
            const angle = Math.atan2(btnY - mouseY, btnX - mouseX);
            const moveDist = 200; 
            let newX = btnX + Math.cos(angle) * moveDist;
            let newY = btnY + Math.sin(angle) * moveDist;

            // Constrain to screen
            newX = Math.max(50, Math.min(window.innerWidth - 200, newX));
            newY = Math.max(50, Math.min(window.innerHeight - 100, newY));

            commitBtn.style.left = newX + 'px';
            commitBtn.style.top = newY + 'px';
        }
    });

    // 3. THE SENSORY OVERLOAD
    const timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `TERMINATION IN: ${timeLeft}s`;

        if (timeLeft < 100) {
            body.classList.toggle('glitch-active', timeLeft % 2 === 0);
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            body.innerHTML = "<h1 style='color:white; font-size:5em;'>MEMORY LEAK: SYSTEM PURGED</h1>";
            setTimeout(() => location.reload(), 1500);
        }
    }, 1000);

    // 4. THE HARSH AUDIO (Square wave + Gain Jitter)
    document.getElementById('play').onclick = () => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'square';
        osc.frequency.value = parseFloat(freqSlider.value);
        
        // Add a "broken" volume flicker
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        for(let i=0; i<10; i++) {
            gain.gain.exponentialRampToValueAtTime(Math.random() * 0.2 + 0.01, audioCtx.currentTime + (i * 0.05));
        }

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    };

    // 5. THE COMMIT TRAP
    commitBtn.onclick = () => {
        circuitHeat += 20;
        timeLeft -= 12;
        buffer.push(freqSlider.value);
        document.getElementById('buffer').innerText = "BUFFER: " + "█".repeat(buffer.length);
        document.getElementById('display').innerText = "NODE CAPTURED. HEAT RISING.";
        
        // Spawn a fake error message
        const err = document.createElement('div');
        err.style.position = 'fixed';
        err.style.left = Math.random() * 80 + '%';
        err.style.top = Math.random() * 80 + '%';
        err.style.color = 'red';
        err.innerText = "CRITICAL_DRIFT_DETECTED";
        body.appendChild(err);
        setTimeout(() => err.remove(), 1000);
    };

    // 6. THE FINAL FAIL
    document.getElementById('submit').onclick = () => {
        document.getElementById('display').innerText = "VERIFYING HARMONIC INTEGRITY...";
        setTimeout(() => {
            alert("UPLINK DENIED: Phase variance exceeds 0.0000001%. Local data incinerated.");
            location.reload();
        }, 2000);
    };
</script>
</body>
</html>
